<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Net Worth Predictor</title>
    <style>
      body {
        width: 220px;
        font-family: system-ui, sans-serif;
        padding: 16px;
        text-align: center;
        background: #0f172a;
        color: #f8fafc;
      }
      h1 {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #94a3b8;
        margin: 0 0 8px;
      }
      #netWorth {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 4px;
      }
      #netWorth.negative {
        color: #f87171;
      }
      #netWorth.positive {
        color: #4ade80;
      }
      #shortsWatched {
        font-size: 12px;
        color: #94a3b8;
        margin: 0 0 16px;
      }
      button {
        width: 100%;
        padding: 8px;
        border: none;
        border-radius: 6px;
        background: #1e293b;
        color: #f8fafc;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover {
        background: #334155;
      }
    </style>
  </head>
  <body>
    <h1>Future Net Worth</h1>
    <p id="netWorth">$0</p>
    <p id="shortsWatched">0 shorts watched</p>
    <button id="reset">Reset</button>
    <script src="popup.js"></script>
  </body>
</html>
