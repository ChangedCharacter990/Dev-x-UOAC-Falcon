<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Net Worth Estimator</title>
<style>
  :root { color-scheme: dark; }
  body {
    font-family: system-ui, sans-serif;
    max-width: 420px;
    margin: 40px auto;
    padding: 20px;
    color: #f8fafc;
    background: #0f172a;
  }
  p.eyebrow {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #94a3b8;
    margin: 0 0 4px;
    text-align: center;
  }
  h1 {
    font-size: 15px;
    font-weight: 600;
    margin: 0 0 4px;
    text-align: center;
    color: #e2e8f0;
  }
  p.subhead {
    font-size: 10px;
    color: #64748b;
    margin: 0 0 16px;
    text-align: center;
  }
  .row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 10px; }
  .card {
    background: #1e293b;
    border-radius: 8px;
    padding: 10px;
    border: 1px solid #334155;
  }
  .card p { font-size: 11px; color: #94a3b8; margin: 0 0 4px; }
  .card input[type="number"] {
    width: 100%;
    font-size: 14px;
    padding: 6px;
    box-sizing: border-box;
    background: #0f172a;
    border: 1px solid #334155;
    border-radius: 4px;
    color: #f8fafc;
  }
  .slider-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .slider-row label { font-size: 11px; color: #94a3b8; min-width: 110px; }
  .slider-row input[type="range"] { flex: 1; accent-color: #4ade80; }
  .slider-row span { font-size: 11px; font-weight: 600; min-width: 36px; text-align: right; color: #f8fafc; }
  .result-card p:first-child { font-size: 11px; color: #94a3b8; margin: 0 0 4px; }
  .result-card p:last-child { font-size: 18px; font-weight: 700; margin: 0; color: #4ade80; }
  #start-button {
    width: 100%;
    padding: 10px;
    margin-top: 6px;
    font-size: 13px;
    font-weight: 600;
    color: #f8fafc;
    background: #16a34a;
    border: 0;
    border-radius: 6px;
    cursor: pointer;
  }
  #save-status { min-height: 18px; margin: 8px 0 0; color: #4ade80; font-size: 12px; text-align: center; }
  #chart {
    width: 100%;
    height: 200px;
    display: block;
    margin-top: 14px;
    background: #1e293b;
    border-radius: 8px;
    border: 1px solid #334155;
  }
</style>
</head>
<body>

<p class="eyebrow">Your Financial Journey</p>
<h1>Net worth estimator</h1>
<p class="subhead">Tune the sliders — this sets your starting balance.</p>

<div class="row">
  <div class="card">
    <p>Current net worth</p>
    <input type="number" id="start" min="0" value="0" step="1000">
  </div>
  <div class="card">
    <p>Starting salary</p>
    <input type="number" id="salary" min="0" value="0" step="1000">
  </div>
</div>

<div class="slider-row">
  <label>Savings rate</label>
  <input type="range" min="0" max="100" value="0" step="1" id="savings-rate">
  <span id="savings-rate-out">0%</span>
</div>

<div class="slider-row">
  <label>Annual raise</label>
  <input type="range" min="0" max="20" value="0" step="0.5" id="annual-raise">
  <span id="annual-raise-out">0%</span>
</div>

<div class="slider-row">
  <label>Promotion bump</label>
  <input type="range" min="0" max="100" value="0" step="1" id="promo-bump">
  <span id="promo-bump-out">0%</span>
</div>

<div class="slider-row">
  <label>Years per promotion</label>
  <input type="range" min="1" max="20" value="1" step="1" id="promo-freq">
  <span id="promo-freq-out">1</span>
</div>

<div class="slider-row">
  <label>Investment return</label>
  <input type="range" min="0" max="30" value="0" step="0.5" id="rate">
  <span id="rate-out">0%</span>
</div>

<div class="slider-row">
  <label>Years ahead</label>
  <input type="range" min="1" max="60" value="1" step="1" id="years">
  <span id="years-out">1</span>
</div>

<div class="row">
  <div class="card result-card">
    <p>Salary in <span id="years-label-a">1</span> years</p>
    <p id="salary-result">$0</p>
  </div>
  <div class="card result-card">
    <p>Net worth in <span id="years-label-b">1</span> years</p>
    <p id="nw-result">$0</p>
  </div>
</div>

<button id="start-button" type="button">Start with this net worth</button>
<p id="save-status" role="status"></p>

<canvas id="chart" aria-label="Line chart of projected net worth growth over time, drawn with plain canvas" width="1360" height="560"></canvas>
<script src="networthInitialization.js"></script>

</body></html>
